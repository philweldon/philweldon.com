<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Turing Testimony</title>
<style>
/* ============================================================
   DESIGN: Dark legal-tech courtroom aesthetic
   Font: Courier-style mono for transcript feel + serif for headers
   Color: Deep navy, amber accents, parchment whites
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --bg-deep: #0a0c14;
  --bg-panel: #0f1220;
  --bg-card: #141828;
  --bg-card-hover: #1a1f30;
  --border: #2a3050;
  --border-glow: #3d4a7a;
  --amber: #f5a623;
  --amber-dim: #c4821a;
  --amber-glow: rgba(245,166,35,0.15);
  --green: #4caf7d;
  --green-dim: #2d7a52;
  --red: #e05252;
  --red-dim: #a33838;
  --blue: #5b8def;
  --blue-dim: #3a5fa0;
  --parchment: #e8e0cc;
  --text-main: #d4cfc4;
  --text-dim: #7a7a8a;
  --text-bright: #f0ece0;
  --font-transcript: 'Share Tech Mono', 'Courier New', monospace;
  --font-serif: 'Libre Baskerville', Georgia, serif;
  --font-display: 'IM Fell English', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-deep);
  color: var(--text-main);
  font-family: var(--font-transcript);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(91,141,239,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(245,166,35,0.04) 0%, transparent 60%);
}

/* ---- Scanline texture overlay ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  z-index: 1000;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* ---- Header ---- */
.court-header {
  text-align: center;
  padding: 32px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.court-seal {
  font-size: 2.5rem;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(245,166,35,0.4));
}
.court-title {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  color: var(--parchment);
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.court-subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 6px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ---- Stats bar ---- */
#stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
@media (min-width: 600px) {
  #stats-bar { grid-template-columns: repeat(6, 1fr); }
}
.stat-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 6px;
  text-align: center;
  transition: border-color 0.3s;
}
.stat-box.changed { border-color: var(--amber); animation: stat-pulse 0.6s ease; }
@keyframes stat-pulse {
  0%,100% { box-shadow: none; }
  50% { box-shadow: 0 0 12px rgba(245,166,35,0.4); }
}
.stat-label {
  font-size: 0.6rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.stat-value {
  font-size: 1rem;
  font-weight: bold;
  color: var(--amber);
}
.stat-bar-fill {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}
.stat-bar-inner {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
  background: var(--amber);
}

/* ---- Progress indicator ---- */
#progress-track {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.prog-step {
  flex: 1;
  min-width: 0;
  text-align: center;
  position: relative;
}
.prog-step::after {
  content: '';
  position: absolute;
  top: 11px;
  left: 50%;
  width: 100%;
  height: 1px;
  background: var(--border);
}
.prog-step:last-child::after { display: none; }
.prog-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--border);
  margin: 0 auto 4px;
  font-size: 0.55rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  position: relative;
  z-index: 1;
  transition: all 0.3s;
}
.prog-step.done .prog-dot { background: var(--green-dim); border-color: var(--green); color: #fff; }
.prog-step.active .prog-dot { background: var(--amber-dim); border-color: var(--amber); color: #fff; box-shadow: 0 0 10px var(--amber-glow); }
.prog-label {
  font-size: 0.55rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.prog-step.active .prog-label { color: var(--amber); }

/* ---- Courtroom transcript box ---- */
#transcript-box {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 20px;
  min-height: 280px;
  position: relative;
}
.transcript-line {
  margin-bottom: 16px;
  animation: line-appear 0.4s ease;
}
@keyframes line-appear {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.speaker {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}
.speaker.judge    { color: var(--amber); }
.speaker.counsel  { color: var(--red); }
.speaker.player   { color: var(--green); }
.speaker.partner  { color: var(--blue); }
.speaker.ai       { color: #b57bee; }
.speaker.narrator { color: var(--text-dim); font-style: italic; }
.speech {
  font-family: var(--font-serif);
  font-size: 0.9rem;
  line-height: 1.6;
  color: var(--text-bright);
}
.speech em { color: var(--amber); font-style: normal; }
.speech .highlight { color: var(--green); font-weight: bold; }

/* ---- Reaction bubble ---- */
.reaction {
  display: inline-block;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-left: 8px;
  animation: wobble 0.4s ease;
}
@keyframes wobble {
  0%,100% { transform: rotate(0); }
  25% { transform: rotate(-1.5deg); }
  75% { transform: rotate(1.5deg); }
}

/* ---- Choice section ---- */
#choice-area {
  margin-bottom: 24px;
}
.choice-prompt {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.choice-btn {
  display: block;
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-serif);
  font-size: 0.85rem;
  color: var(--text-main);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.choice-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--amber-glow);
  opacity: 0;
  transition: opacity 0.2s;
}
.choice-btn:hover { border-color: var(--amber); color: var(--text-bright); transform: translateX(3px); }
.choice-btn:hover::before { opacity: 1; }
.choice-btn:active { transform: translateX(5px) scale(0.99); }
.choice-btn .choice-letter {
  display: inline-block;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--border);
  text-align: center;
  line-height: 22px;
  font-family: var(--font-transcript);
  font-size: 0.7rem;
  margin-right: 10px;
  color: var(--amber);
}
.choice-btn.selected { border-color: var(--green); background: rgba(76,175,125,0.1); }
.choice-btn.wrong    { border-color: var(--red);   background: rgba(224,82,82,0.07); opacity: 0.7; }

/* ---- Feedback panel ---- */
#feedback-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 20px;
  display: none;
  animation: line-appear 0.3s ease;
}
#feedback-panel.show { display: block; }
.feedback-title {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--amber);
  margin-bottom: 8px;
}
.feedback-body {
  font-family: var(--font-serif);
  font-size: 0.85rem;
  line-height: 1.6;
  color: var(--text-main);
}
.feedback-stat-change {
  margin-top: 10px;
  font-size: 0.75rem;
  color: var(--green);
  border-top: 1px solid var(--border);
  padding-top: 8px;
}

/* ---- Document coding grid ---- */
#doc-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
@media (min-width: 500px) {
  #doc-grid { grid-template-columns: 1fr 1fr; }
}
.doc-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.doc-card:hover { border-color: var(--border-glow); transform: translateY(-1px); }
.doc-card.coded-responsive { border-color: var(--red); background: rgba(224,82,82,0.08); }
.doc-card.coded-non { border-color: var(--blue); background: rgba(91,141,239,0.08); }
.doc-card.coded-privileged { border-color: var(--amber); background: rgba(245,166,35,0.08); }
.doc-subject {
  font-size: 0.75rem;
  color: var(--parchment);
  margin-bottom: 4px;
  line-height: 1.3;
}
.doc-meta {
  font-size: 0.6rem;
  color: var(--text-dim);
}
.doc-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 10px;
}
.badge-r { background: rgba(224,82,82,0.3); color: var(--red); border: 1px solid var(--red); }
.badge-n { background: rgba(91,141,239,0.3); color: var(--blue); border: 1px solid var(--blue); }
.badge-p { background: rgba(245,166,35,0.3); color: var(--amber); border: 1px solid var(--amber); }

/* ---- SVM Diagram ---- */
.svm-diagram {
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  margin: 16px 0;
  text-align: center;
  font-family: var(--font-transcript);
  font-size: 0.7rem;
}
.svm-canvas {
  width: 100%;
  max-width: 440px;
  height: 180px;
  position: relative;
  margin: 0 auto;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg-panel);
}
.svm-dot {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: all 0.5s;
}
.svm-dot.responsive { background: var(--red); box-shadow: 0 0 6px var(--red); }
.svm-dot.nonresponsive { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
.svm-dot.boundary { background: var(--amber); box-shadow: 0 0 8px var(--amber); ring: 2px; outline: 2px solid var(--amber); outline-offset: 2px; }
.svm-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--amber);
  box-shadow: 0 0 12px var(--amber);
  transition: left 0.6s ease;
}
.svm-zone-label {
  position: absolute;
  bottom: 8px;
  font-size: 0.6rem;
  color: var(--text-dim);
  pointer-events: none;
}

/* ---- Next button ---- */
#next-btn {
  display: none;
  background: linear-gradient(135deg, var(--amber-dim), var(--amber));
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 12px 28px;
  font-family: var(--font-transcript);
  font-size: 0.85rem;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(245,166,35,0.25);
}
#next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(245,166,35,0.4); }
#next-btn.show { display: inline-block; }

/* ---- Verdict screen ---- */
#verdict-screen {
  display: none;
  text-align: center;
  padding: 40px 20px;
  animation: line-appear 0.6s ease;
}
#verdict-screen.show { display: block; }
.verdict-seal {
  font-size: 5rem;
  margin-bottom: 16px;
  animation: pulse-seal 2s ease infinite;
}
@keyframes pulse-seal {
  0%,100% { filter: drop-shadow(0 0 10px rgba(245,166,35,0.4)); }
  50%      { filter: drop-shadow(0 0 25px rgba(245,166,35,0.8)); }
}
.verdict-title {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: var(--parchment);
  margin-bottom: 12px;
}
.verdict-subtitle {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  color: var(--text-main);
  max-width: 560px;
  margin: 0 auto 24px;
  line-height: 1.6;
}
.verdict-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 32px;
}
.verdict-stat-pill {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.75rem;
}

/* ---- "What you learned" section ---- */
.learned-section {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-top: 24px;
  text-align: left;
}
.learned-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  color: var(--amber);
  margin-bottom: 16px;
  font-style: italic;
}
.learned-item {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
  align-items: flex-start;
}
.learned-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.learned-text { font-family: var(--font-serif); font-size: 0.82rem; line-height: 1.5; color: var(--text-main); }
.learned-text strong { color: var(--parchment); }

/* ---- Restart button ---- */
#restart-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 6px;
  padding: 10px 20px;
  font-family: var(--font-transcript);
  font-size: 0.75rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: all 0.2s;
  margin-top: 16px;
}
#restart-btn:hover { border-color: var(--amber); color: var(--amber); }

/* ---- Disclaimer ---- */
.disclaimer {
  text-align: center;
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  line-height: 1.5;
}

/* ---- Coding score display ---- */
.coding-score {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.coding-score span { color: var(--amber); }

/* ---- Doc-coding action buttons ---- */
.doc-actions {
  display: none;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.doc-card.active .doc-actions { display: flex; }
.doc-action-btn {
  flex: 1;
  min-width: 0;
  padding: 5px 4px;
  border-radius: 4px;
  border: 1px solid;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
  font-family: var(--font-transcript);
}
.doc-action-btn.resp   { border-color: var(--red);   color: var(--red);   }
.doc-action-btn.nonr   { border-color: var(--blue);  color: var(--blue);  }
.doc-action-btn.priv   { border-color: var(--amber); color: var(--amber); }
.doc-action-btn:hover  { filter: brightness(1.3); transform: scale(1.03); }

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }
</style>

/* ============================================================
   HELPERS
   ============================================================ */
function clamp(v, min=0, max=100) { return Math.min(max, Math.max(min, v)); }

function applyDeltas(deltas) {
  if (!deltas) return [];
  const changes = [];
  for (const [k, v] of Object.entries(deltas)) {
    const old = state[k];
    state[k] = clamp(state[k] + v);
    changes.push({ key: k, delta: v, newVal: state[k] });
  }
  return changes;
}

function statLabel(key) {
  return STATS.find(s => s.key === key)?.label.replace('\n',' ') || key;
}

   RENDER FUNCTIONS
   ============================================================ */
function renderStats() {
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = STATS.map(s => {
    const val = state[s.key];
    // Color rules
    let barColor = s.color;
    if (s.key === 'partnerPanic') barColor = val > 70 ? '#e05252' : val > 40 ? '#f5a623' : '#4caf7d';
    if (s.key === 'budgetRemaining') barColor = val < 30 ? '#e05252' : val < 60 ? '#f5a623' : '#4caf7d';
    return `
      <div class="stat-box" id="stat-${s.key}">
        <div class="stat-label">${s.icon} ${s.label.replace('\n','<br>')}</div>
        <div class="stat-value">${val}</div>
        <div class="stat-bar-fill"><div class="stat-bar-inner" style="width:${val}%;background:${barColor}"></div></div>
      </div>`;
  }).join('');
}

function animateStat(key) {
  const el = document.getElementById('stat-' + key);
  if (el) {
    el.classList.remove('changed');
    void el.offsetWidth;
    el.classList.add('changed');
  }
}

function renderProgress() {
  const track = document.getElementById('progress-track');
  track.innerHTML = SCENES.map((s, i) => {
    const done = i < state.stage;
    const active = i === state.stage;
    const cls = done ? 'done' : active ? 'active' : '';
    const icon = done ? '✓' : i + 1;
    return `
      <div class="prog-step ${cls}">
        <div class="prog-dot">${icon}</div>
        <div class="prog-label">${s.label}</div>
      </div>`;
  }).join('');
}

function renderTranscript(lines) {
  const box = document.getElementById('transcript-box');
  box.innerHTML = lines.map(l => `
    <div class="transcript-line">
      <div class="speaker ${l.speaker}">${speakerName(l.speaker)}</div>
      <div class="speech">${l.text}</div>
    </div>`).join('');
}

function speakerName(s) {
  const names = {
    judge: '⚖️ THE COURT',
    counsel: '💼 OPPOSING COUNSEL',
    player: '🧑‍💼 COUNSEL (You)',
    partner: '👤 SENIOR PARTNER',
    ai: '🤖 THE MODEL',
    narrator: '📜 [COURT RECORD]',
  };
  return names[s] || s.toUpperCase();
}

function renderChoices(scene, choicesMade) {
  const area = document.getElementById('choice-area');
  area.innerHTML = `<div class="choice-prompt">${scene.choicePrompt}</div>` +
    scene.options.map((opt, i) => {
      let cls = '';
      if (choicesMade !== undefined) {
        cls = (i === choicesMade) ? (opt.correct ? 'selected' : 'wrong') :
              (opt.correct ? 'selected' : 'wrong');
        if (i === choicesMade && !opt.correct) cls = 'wrong';
        if (i !== choicesMade && opt.correct) cls = 'selected';
        if (i !== choicesMade && !opt.correct) cls = 'wrong';
      }
      const disabled = choicesMade !== undefined ? 'disabled' : '';
      return `
        <button class="choice-btn ${cls}" ${disabled} onclick="handleChoice(${state.stage}, ${i})">
          <span class="choice-letter">${opt.letter}</span>${opt.text}
        </button>`;
    }).join('');
}

function renderCodingStage(scene) {
  const area = document.getElementById('choice-area');
  const docs = scene.codingDocs.map(id => DOCUMENTS.find(d => d.id === id));
  const coded = docs.filter(d => state.codedDocs[d.id]);
  const remaining = scene.minToCode - coded.length;

  area.innerHTML = `
    <div class="coding-score">
      Documents coded: <span>${coded.length} / ${docs.length}</span>
      ${remaining > 0 ? ` — Code at least <span>${remaining} more</span> to continue` : ' — <span style="color:var(--green)">Enough to proceed!</span>'}
    </div>
    <div id="doc-grid">
      ${docs.map(d => {
        const code = state.codedDocs[d.id];
        let codedClass = code ? `coded-${code}` : '';
        let badge = '';
        if (code === 'responsive') badge = '<span class="doc-badge badge-r">Responsive</span>';
        else if (code === 'non') badge = '<span class="doc-badge badge-n">Non-Resp.</span>';
        else if (code === 'privileged') badge = '<span class="doc-badge badge-p">Privileged</span>';
        return `
          <div class="doc-card ${codedClass}" id="dcard-${d.id}" onclick="toggleDocCard('${d.id}')">
            ${badge}
            <div class="doc-subject">${d.subject}</div>
            <div class="doc-meta">From: ${d.from} &nbsp;|&nbsp; ${d.date}</div>
            <div class="doc-actions">
              <button class="doc-action-btn resp" onclick="codeDoc(event,'${d.id}','responsive')">Responsive</button>
              <button class="doc-action-btn nonr" onclick="codeDoc(event,'${d.id}','non')">Non-Resp.</button>
              <button class="doc-action-btn priv" onclick="codeDoc(event,'${d.id}','privileged')">Privileged</button>
            </div>
          </div>`;
      }).join('')}
    </div>`;

  // Show next button if enough coded
  const nextBtn = document.getElementById('next-btn');
  if (coded.length >= scene.minToCode) {
    nextBtn.classList.add('show');
  } else {
    nextBtn.classList.remove('show');
  }
}

function toggleDocCard(id) {
  const card = document.getElementById('dcard-' + id);
  // Deactivate all others
  document.querySelectorAll('.doc-card.active').forEach(c => {
    if (c !== card) c.classList.remove('active');
  });
  card.classList.toggle('active');
}

function codeDoc(event, id, code) {
  event.stopPropagation();
  const doc = DOCUMENTS.find(d => d.id === id);
  const wasRight = doc.correctCode === code;

  state.codedDocs[id] = code;

  // Remove active
  document.getElementById('dcard-' + id).classList.remove('active');

  // Apply stat deltas (kept for score calculation at verdict)
  const deltas = wasRight
    ? { modelConfidence: +8, recall: +5, precision: +5 }
    : { modelConfidence: -5, recall: -3 };
  applyDeltas(deltas);

  // Show feedback
  const fb = document.getElementById('feedback-panel');
  const fbBody = document.getElementById('feedback-body');
  fb.classList.add('show');
  const statusText = wasRight ? '✓ Correctly coded.' : `✗ Incorrect. Correct code: ${doc.correctCode === 'non' ? 'Non-responsive' : doc.correctCode.charAt(0).toUpperCase() + doc.correctCode.slice(1)}`;
  fbBody.innerHTML = `<strong>${statusText}</strong><br><br><em>${doc.hint}</em>`;

  // Re-render grid
  const scene = SCENES[state.stage];
  renderCodingStage(scene);
}

/* ============================================================
   EVENT HANDLERS
   ============================================================ */
function handleChoice(sceneIdx, optionIdx) {
  const scene = SCENES[sceneIdx];
  const opt = scene.options[optionIdx];

  // Record choice
  state.choiceHistory[sceneIdx] = optionIdx;

  // Apply deltas (kept for score calculation at verdict)
  applyDeltas(opt.deltas);

  // Show feedback
  const fb = document.getElementById('feedback-panel');
  const fbBody = document.getElementById('feedback-body');
  fb.classList.add('show');
  fbBody.innerHTML = `<strong>${opt.correct ? '✓ Good answer.' : '✗ Incorrect.'}</strong><br><br>${opt.feedback}`;

  // Re-render choices with results shown
  renderChoices(scene, optionIdx);

  // Show next button
  document.getElementById('next-btn').classList.add('show');
}

function advanceScene() {
  state.stage++;
  document.getElementById('feedback-panel').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  renderProgress();
  renderScene();
}

/* ============================================================
   SCENE RENDERER
   ============================================================ */
function renderScene() {
  if (state.stage >= SCENES.length) {
    renderVerdict();
    return;
  }

  const scene = SCENES[state.stage];

  // Transcript
  renderTranscript(scene.transcript);

  // SVM diagram (injected after transcript if needed)
  if (scene.showSVM) {
    document.getElementById('transcript-box').insertAdjacentHTML('beforeend', renderSVMDiagram());
  }

  // Type-specific rendering
  const area = document.getElementById('choice-area');

  if (scene.type === 'choice') {
    renderChoices(scene);
    // If already answered (shouldn't happen on new game, but for safety)
    if (state.choiceHistory[state.stage] !== undefined) {
      renderChoices(scene, state.choiceHistory[state.stage]);
      document.getElementById('next-btn').classList.add('show');
    }
  } else if (scene.type === 'coding') {
    document.getElementById('feedback-panel').classList.remove('show');
    renderCodingStage(scene);
  } else if (scene.type === 'verdict') {
    area.innerHTML = '';
    document.getElementById('next-btn').classList.remove('show');
    // Auto-advance to verdict after transcript
    setTimeout(() => renderVerdict(), 1800);
  }
}

/* ============================================================
   VERDICT
   ============================================================ */
function renderVerdict() {
  // Hide game panels
  document.getElementById('transcript-box').style.display = 'none';
  document.getElementById('choice-area').style.display = 'none';
  document.getElementById('feedback-panel').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('progress-track').style.display = 'none';

  const score = state.judgeUnderstanding + state.recall + state.precision + state.modelConfidence - state.partnerPanic + state.budgetRemaining;

  let verdict, sealEmoji, verdictSub, verdictColor;

  if (score >= 300) {
    verdict = 'Defensible Workflow Hero';
    sealEmoji = '🏆';
    verdictColor = 'var(--green)';
    verdictSub = 'The court finds that your TAR process was well-designed, properly validated, and clearly explained. Precision was high, recall was defensible, and the quality controls were documented. The process meets the reasonableness standard courts apply to active learning protocols.';
  } else if (score >= 200) {
    verdict = 'Defensible Process, Incomplete Record';
    sealEmoji = '🤔';
    verdictColor = 'var(--amber)';
    verdictSub = 'The court finds the process defensible but imperfectly documented. The validation methodology was adequate, but the explanation of the training process and quality controls left gaps that opposing counsel was able to exploit. The record should have been more complete.';
  } else {
    verdict = 'Process Not Adequately Established';
    sealEmoji = '⚠️';
    verdictColor = 'var(--red)';
    verdictSub = 'The court finds that the TAR process lacked adequate explanation, validation, or both. A defensible TAR protocol requires documented training procedures, elusion testing results, and a clear explanation of how the model was validated. Review the relevant case law before your next TAR deposition.';
  }

  const screen = document.getElementById('verdict-screen');
  screen.classList.add('show');
  screen.innerHTML = `
    <div class="verdict-seal" style="color:${verdictColor}">${sealEmoji}</div>
    <div class="verdict-title" style="color:${verdictColor}">${verdict}</div>
    <div class="verdict-subtitle">${verdictSub}</div>

    <!-- WHAT YOU ACCIDENTALLY LEARNED -->
    <div class="learned-section">
      <div class="learned-title">Key Concepts</div>

      <div class="learned-item">
        <div class="learned-icon">1️⃣</div>
        <div class="learned-text"><strong>Active learning requires human training data.</strong> Reviewers code sample documents as responsive or non-responsive. The model learns from those examples, not from magic.</div>
      </div>
      <div class="learned-item">
        <div class="learned-icon">2️⃣</div>
        <div class="learned-text"><strong>A support vector machine finds an optimal decision boundary</strong> that separates responsive from non-responsive documents, maximizing the margin between the two groups.</div>
      </div>
      <div class="learned-item">
        <div class="learned-icon">3️⃣</div>
        <div class="learned-text"><strong>Documents closest to the boundary are the most valuable for training.</strong> These "near-boundary" documents are what the model is most uncertain about — reviewing them gives the most information per dollar spent.</div>
      </div>
      <div class="learned-item">
        <div class="learned-icon">4️⃣</div>
        <div class="learned-text"><strong>Recall measures how many relevant documents you found.</strong> Precision measures how many of the documents you flagged were actually relevant. Both matter, and they often trade off against each other.</div>
      </div>
      <div class="learned-item">
        <div class="learned-icon">5️⃣</div>
        <div class="learned-text"><strong>Elusion testing</strong> validates the process: you sample from the non-produced set and manually check whether the model missed too many responsive documents. This is what makes TAR defensible.</div>
      </div>
      <div class="learned-item">
        <div class="learned-icon">6️⃣</div>
        <div class="learned-text"><strong>TAR doesn't replace lawyer judgment.</strong> It prioritizes the review queue. Lawyers still make the calls on responsiveness, privilege, and production — the model just helps surface the right documents first.</div>
      </div>
      <div class="learned-item">
        <div class="learned-icon">7️⃣</div>
        <div class="learned-text"><strong>Defensibility requires documentation.</strong> Courts apply a reasonableness standard, not a perfection standard. But you have to show your work: training process, validation results, and quality controls.</div>
      </div>
    </div>

    <button id="restart-btn" onclick="restartGame()">↺ Retry Testimony</button>
  `;
}

/* ============================================================
   RESTART
   ============================================================ */
function restartGame() {
  // Reset state
  state.stage = 0;
  state.judgeUnderstanding = 30;
  state.modelConfidence = 10;
  state.recall = 20;
  state.precision = 20;
  state.partnerPanic = 60;
  state.budgetRemaining = 100;
  state.codedDocs = {};
  state.codingCorrect = 0;
  state.choiceHistory = [];

  // Restore panels
  document.getElementById('transcript-box').style.display = '';
  document.getElementById('choice-area').style.display = '';
  document.getElementById('feedback-panel').style.display = '';
  document.getElementById('next-btn').style.display = '';
  document.getElementById('progress-track').style.display = '';
  document.getElementById('verdict-screen').classList.remove('show');
  document.getElementById('verdict-screen').innerHTML = '';

  renderProgress();
  renderScene();
}

/* ============================================================
   INIT
   ============================================================ */
renderProgress();
renderScene();
</script>
</body>
</html>
