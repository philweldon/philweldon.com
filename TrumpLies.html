<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Trumps and a Lie</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    font-family: 'Patrick Hand', cursive;
    font-size: 18px;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px 60px;
  }

  /* ── XKCD sketch filter ── */
  svg.defs { position: absolute; width: 0; height: 0; }

  .sketchy { filter: url(#roughen); }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 680px;
    text-align: center;
    border-bottom: 2.5px solid #111;
    padding-bottom: 18px;
    margin-bottom: 28px;
  }

  h1 {
    font-size: 2.6em;
    font-weight: normal;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .tagline {
    font-style: italic;
    font-size: 1em;
    color: #444;
    margin-top: 4px;
  }

  .score-bar {
    margin-top: 10px;
    font-size: 1.05em;
  }

  /* ── Game area ── */
  .game-area {
    width: 100%;
    max-width: 680px;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 50px 20px;
    font-style: italic;
    font-size: 1.2em;
  }

  .loading svg { display: block; margin: 0 auto 20px; }

  /* ── Round header ── */
  .round-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .round-label { font-size: 1.1em; font-style: italic; }

  /* ── Instruction banner ── */
  .instruction {
    border: 2px solid #111;
    background: #f5f5f5;
    padding: 10px 16px;
    margin-bottom: 18px;
    font-size: 1em;
  }

  /* ── Headline cards ── */
  .headlines { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }

  .card {
    border: 2px solid #111;
    padding: 16px 18px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    user-select: none;
  }

  .card:hover { background: #f0f0f0; }
  .card.selected { background: #ebebeb; border-width: 3px; }
  .card.disabled { cursor: default; }

  .card-label {
    font-size: 0.8em;
    font-style: italic;
    color: #666;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-text { font-size: 1.1em; line-height: 1.45; }

  /* Reveal states */
  .card.is-lie   { background: #fff9c4; }
  .card.is-real  { background: #f0f0f0; }
  .card.guessed-wrong { background: #fde8e8; }

  .verdict {
    margin-top: 10px;
    font-size: 1em;
    font-weight: bold;
    padding-top: 8px;
    border-top: 1px dashed #aaa;
  }

  .source {
    margin-top: 5px;
    font-size: 0.85em;
    font-style: italic;
    color: #333;
  }

  .source a { color: #333; }

  /* ── Buttons ── */
  .btn {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.15em;
    padding: 10px 26px;
    border: 2px solid #111;
    background: #fff;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition: background 0.1s;
  }

  .btn:hover:not(:disabled) { background: #f0f0f0; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Round result ── */
  .round-result {
    text-align: center;
    margin-top: 16px;
  }

  .round-result p {
    font-style: italic;
    font-size: 1.2em;
    margin-bottom: 14px;
  }

  /* ── Final score ── */
  .final {
    border: 3px solid #111;
    padding: 40px 30px;
    text-align: center;
    margin-top: 10px;
  }

  .final h2 { font-size: 2em; font-weight: normal; margin-bottom: 10px; }

  .big-score {
    font-size: 4em;
    line-height: 1;
    margin: 16px 0;
  }

  .final-comment { font-style: italic; font-size: 1.2em; margin-bottom: 24px; }

  /* ── Error ── */
  .error {
    border: 2px solid #c00;
    padding: 20px;
    color: #c00;
    font-style: italic;
    margin-top: 20px;
    text-align: center;
  }

  .error .btn { color: #111; margin-top: 14px; }

  /* ── Stick figure ── */
  .stick { display: block; margin: 0 auto 16px; }
</style>
</head>
<body>

<!-- Hidden SVG defs for sketch filter -->
<svg class="defs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughen" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<header>
  <h1 class="sketchy">Two Trumps and a Lie</h1>
  <p class="tagline">a game of alternative facts &mdash; powered by real news &amp; AI</p>
  <div class="score-bar" id="score-bar" style="visibility:hidden">
    Score: <strong id="score-val">0</strong> / <span id="score-of">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp; Round <span id="round-num">1</span> of 5
  </div>
</header>

<div class="game-area" id="game-area"></div>

<script>
// ─── Config ─────────────────────────────────────────────────────────────────
const PROXY   = 'https://silent-sunset-38f6.pbweldon-2ef.workers.dev/';
const MODEL   = 'claude-sonnet-4-5';
const ROUNDS  = 5;

// ─── State ───────────────────────────────────────────────────────────────────
let round    = 0;
let score    = 0;
let picked   = null;
let revealed = false;
let cards    = [];

// ─── API ─────────────────────────────────────────────────────────────────────
async function callClaude(messages) {
  const headers = {
    'Content-Type':    'application/json',
    'anthropic-version': '2023-06-01',
    'anthropic-beta':  'web-search-2025-03-05',
  };

  let body = {
    model: MODEL,
    max_tokens: 2048,
    tools: [{ type: 'web_search_20250305', name: 'web_search' }],
    messages: [...messages],
  };

  // Agentic loop — handles tool_use stop_reason (unlikely for built-in search,
  // but included for robustness)
  for (let i = 0; i < 6; i++) {
    const resp = await fetch(PROXY, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(`API ${resp.status}: ${txt.slice(0, 200)}`);
    }

    const data = await resp.json();

    // Extract any text block
    const textBlock = (data.content || []).find(b => b.type === 'text');

    if (data.stop_reason === 'end_turn') {
      if (!textBlock) throw new Error('No text in response');
      return textBlock.text;
    }

    if (data.stop_reason === 'tool_use') {
      // Build tool results for each tool_use block and continue
      body.messages = [
        ...body.messages,
        { role: 'assistant', content: data.content },
        {
          role: 'user',
          content: (data.content || [])
            .filter(b => b.type === 'tool_use')
            .map(tu => ({
              type: 'tool_result',
              tool_use_id: tu.id,
              content: tu.input ? JSON.stringify(tu.input) : '[]',
            })),
        },
      ];
      continue;
    }

    // Any other stop_reason — try to grab text anyway
    if (textBlock) return textBlock.text;
    throw new Error('Unexpected stop_reason: ' + data.stop_reason);
  }

  throw new Error('Exceeded tool-use loop limit');
}

async function fetchRound() {
  const prompt = `You are running a trivia game called "Two Trumps and a Lie."

TASK:
1. Use web_search to find EXACTLY 2 real, recent news headlines about Donald Trump from the past 14 days.
2. Invent 1 fake but plausible Trump headline. It can be funny, but must sound believable.

Return ONLY a valid JSON object — no markdown fences, no explanation, just the JSON:

{
  "headlines": [
    { "text": "full headline text here", "real": true,  "source": "Publication Name", "url": "https://..." },
    { "text": "full headline text here", "real": true,  "source": "Publication Name", "url": "https://..." },
    { "text": "full headline text here", "real": false, "source": null, "url": null }
  ]
}

Rules:
- Shuffle the 3 items so the fake one isn't always last.
- The fake headline must be plausible enough to fool someone.
- Real headlines must be verbatim or near-verbatim from actual sources.
- Return ONLY the JSON. Nothing else.`;

  const raw = await callClaude([{ role: 'user', content: prompt }]);

  // Pull out first {...} block (model sometimes adds tiny preamble)
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Model returned no JSON:\n' + raw.slice(0, 300));

  const parsed = JSON.parse(match[0]);
  if (!Array.isArray(parsed.headlines) || parsed.headlines.length !== 3) {
    throw new Error('Unexpected JSON shape');
  }
  return parsed;
}

// ─── Render helpers ───────────────────────────────────────────────────────────
const el = id => document.getElementById(id);
const area = () => el('game-area');

function showLoading() {
  const msgs = [
    'Consulting the oracle…',
    'Scanning the news cycle…',
    'Fabricating plausible nonsense…',
    'Fact-checking facts with other facts…',
    'Separating signal from noise (good luck)…',
  ];
  area().innerHTML = `
    <div class="loading">
      <svg class="stick" width="72" height="96" viewBox="0 0 72 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- head -->
        <circle cx="36" cy="14" r="11" stroke="#111" stroke-width="2.2"/>
        <!-- famous hair -->
        <path d="M24 10 Q36 -2 48 10" stroke="#111" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M24 10 Q30 4 36 6 Q42 4 48 10" stroke="#111" stroke-width="2" stroke-linecap="round" fill="none"/>
        <!-- body -->
        <line x1="36" y1="25" x2="36" y2="62" stroke="#111" stroke-width="2.2"/>
        <!-- arms (one raised, gesturing) -->
        <line x1="36" y1="38" x2="12" y2="52" stroke="#111" stroke-width="2.2"/>
        <line x1="36" y1="38" x2="60" y2="30" stroke="#111" stroke-width="2.2"/>
        <!-- legs -->
        <line x1="36" y1="62" x2="18" y2="88" stroke="#111" stroke-width="2.2"/>
        <line x1="36" y1="62" x2="54" y2="88" stroke="#111" stroke-width="2.2"/>
      </svg>
      <p>${msgs[round % msgs.length]}</p>
    </div>`;
}

function showError(msg) {
  area().innerHTML = `
    <div class="error">
      <strong>Something went wrong.</strong><br><small>${msg}</small>
      <br>
      <button class="btn" onclick="startRound()">Try again</button>
    </div>`;
}

function renderRound(data) {
  cards    = shuffle(data.headlines);
  picked   = null;
  revealed = false;

  updateScoreBar();

  const cardHtml = cards.map((h, i) => `
    <div class="card sketchy" id="c${i}" onclick="pick(${i})">
      <div class="card-label">Headline ${String.fromCharCode(65 + i)}</div>
      <div class="card-text">${h.text}</div>
    </div>`).join('');

  area().innerHTML = `
    <div class="round-header">
      <span class="round-label">Round ${round + 1} of ${ROUNDS}</span>
    </div>
    <div class="instruction">👆 Which one is the LIE? Tap a headline, then submit.</div>
    <div class="headlines" id="headlines">${cardHtml}</div>
    <button class="btn sketchy" id="sub-btn" onclick="submit()" disabled>That one's the lie &rarr;</button>`;
}

function pick(i) {
  if (revealed) return;
  picked = i;
  document.querySelectorAll('.card').forEach((c, j) => {
    c.classList.toggle('selected', j === i);
  });
  el('sub-btn').disabled = false;
}

function submit() {
  if (picked === null || revealed) return;
  revealed = true;

  const lieIdx = cards.findIndex(h => !h.real);
  const correct = picked === lieIdx;
  if (correct) score++;

  cards.forEach((h, i) => {
    const card = el('c' + i);
    card.onclick = null;
    card.classList.remove('selected');
    card.classList.add('disabled');

    let verdictHtml = '';
    let sourceHtml  = '';

    if (!h.real) {
      card.classList.add('is-lie');
      verdictHtml = `🤥 <strong>THE LIE</strong> — AI-generated`;
      sourceHtml  = `<div class="source">⚠️ This headline was invented by Claude.</div>`;
    } else {
      if (i === picked) {
        // Player picked this real one as the lie — wrong
        card.classList.add('guessed-wrong');
        verdictHtml = `❌ Wrong — this one is <strong>real</strong>`;
      } else {
        card.classList.add('is-real');
        verdictHtml = `✓ Real`;
      }
      const linkHtml = h.url
        ? `<a href="${h.url}" target="_blank" rel="noopener">${h.source}</a>`
        : h.source;
      sourceHtml = `<div class="source">📰 Source: ${linkHtml}</div>`;
    }

    card.innerHTML += `<div class="verdict">${verdictHtml}</div>${sourceHtml}`;
  });

  updateScoreBar();

  const quip     = correct ? quips.correct[score % quips.correct.length]
                           : quips.wrong[round % quips.wrong.length];
  const isLast   = round + 1 >= ROUNDS;
  const nextLabel = isLast ? 'See your final score →' : 'Next round →';
  const nextFn    = isLast ? 'showFinal()' : 'nextRound()';

  el('sub-btn').outerHTML = `
    <div class="round-result">
      <p>${quip}</p>
      <button class="btn sketchy" onclick="${nextFn}">${nextLabel}</button>
    </div>`;
}

function nextRound() { round++; startRound(); }

function showFinal() {
  const pct = score / ROUNDS;
  const comment =
    pct === 1.0 ? "Perfect score. You're basically a human fact-checker."  :
    pct >= 0.8  ? "Great instincts. Lies don't slip past you easily."       :
    pct >= 0.6  ? "Not bad. You got most of them."                          :
    pct >= 0.4  ? "The fake news got you more than once. Rough."            :
                  "You believed more lies than truths. Trump would be proud.";

  area().innerHTML = `
    <div class="final sketchy">
      <h2>Game Over</h2>
      <div class="big-score">${score}/${ROUNDS}</div>
      <p class="final-comment">${comment}</p>
      <button class="btn sketchy" onclick="restart()">Play again →</button>
    </div>`;
}

function restart() { round = 0; score = 0; startRound(); }

function updateScoreBar() {
  const sb = el('score-bar');
  sb.style.visibility = 'visible';
  el('score-val').textContent  = score;
  el('score-of').textContent   = round + (revealed ? 1 : 0);
  el('round-num').textContent  = round + 1;
}

// ─── Utility ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const quips = {
  correct: [
    "Nice — you spotted the lie.",
    "Well done. Your BS detector is working.",
    "Correct! Fake news foiled again.",
    "You got it. Not all headlines are created equal.",
    "Sharp eye. The lie is exposed.",
  ],
  wrong: [
    "Fooled you! That was real.",
    "Ha. Truth is stranger than fiction.",
    "Nope — that actually happened.",
    "Sorry, that one was real. Wild, right?",
    "The real news is the lie you thought was fake.",
  ],
};

// ─── Start ───────────────────────────────────────────────────────────────────
function startRound() {
  showLoading();
  fetchRound()
    .then(data => renderRound(data))
    .catch(err  => showError(err.message));
}

startRound();
</script>
</body>
</html>
