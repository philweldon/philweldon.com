<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil Weldon — Headshots</title>
  <style>
    :root {
      --bg: #faf8f5;
      --ink: #1c1a17;
      --muted: #6b655d;
      --line: #e6e1d8;
      --accent: #b5642f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }
    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
      margin-bottom: 40px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.01em;
    }
    header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 32px;
    }
    figure {
      margin: 0;
    }
    .photo {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      aspect-ratio: 3 / 4;
    }
    .photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    figcaption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }
    .download {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--line);
      padding: 5px 12px;
      border-radius: 5px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .download:hover {
      background: #fff;
      border-color: var(--accent);
    }
    .download:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Phil Weldon — Headshots</h1>
      <p>Right-click to copy, or use the download link under each photo.</p>
    </header>

    <div class="grid">
      <figure>
        <div class="photo">
          <img src="phil-weldon-headshot-1.jpeg" alt="Phil Weldon headshot in suit">
        </div>
        <figcaption>
          <span>suit</span>
          <a class="download" href="phil-weldon-headshot-1.jpeg" download>Download</a>
        </figcaption>
      </figure>

      <figure>
        <div class="photo">
          <img src="phil-weldon-headshot-2.jpeg" alt="Phil Weldon headshot in a patterned shirt in a city park">
        </div>
        <figcaption>
          <span>Patterned shirt</span>
          <a class="download" href="phil-weldon-headshot-2.jpeg" download>Download</a>
        </figcaption>
      </figure>

      <figure>
        <div class="photo">
          <img src="phil-weldon-headshot-3.jpeg" alt="Phil Weldon headshot in a grey plaid blazer against autumn foliage">
        </div>
        <figcaption>
          <span>Plaid blazer</span>
          <a class="download" href="phil-weldon-headshot-3.jpeg" download>Download</a>
        </figcaption>
      </figure>
    </div>
  </div>
</body>
</html>
