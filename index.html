<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phil Weldon — AI, Speaking & Writing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1916;
      --muted: #6b6960;
      --hint: #a09e96;
      --accent: #2d5be3;
      --accent-bg: #eef2fd;
      --success-bg: #edf7f0;
      --success: #1a7a3f;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(250,249,247,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Stage ── */
    #stage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      text-align: center;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 1.75rem;
    }

    .question {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 0.75rem;
      max-width: 560px;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 3rem;
      font-weight: 300;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    .opt-btn {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 1.25rem 1.25rem 1rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
      font-family: inherit;
    }
    .opt-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(45,91,227,0.1);
    }
    .opt-btn:active { transform: translateY(0); }

    .opt-icon {
      font-size: 22px;
      margin-bottom: 10px;
      display: block;
    }
    .opt-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      display: block;
    }
    .opt-hint {
      font-size: 12px;
      color: var(--hint);
      margin-top: 3px;
      display: block;
    }

    /* ── Intro stage ── */
    #intro-stage {
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .visitor-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 99px;
      background: var(--accent-bg);
      color: var(--accent);
      margin-bottom: 2rem;
      letter-spacing: 0.01em;
    }

    .intro-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 5vw, 40px);
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      line-height: 1.2;
    }

    .intro-body {
      font-size: 17px;
      line-height: 1.8;
      color: var(--muted);
      font-weight: 300;
      min-height: 90px;
      max-width: 560px;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--hint);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.85s step-end infinite;
    }

    @keyframes bounce { 0%,80%,100%{transform:scaleY(1)} 40%{transform:scaleY(1.4)} }
    .loading-dots { display: inline-flex; gap: 4px; align-items: center; height: 20px; }
    .loading-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--hint);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    .intro-actions {
      display: flex;
      gap: 10px;
      margin-top: 2.25rem;
      flex-wrap: wrap;
    }

    .action-btn {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 0.65rem 1.2rem;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
    .action-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    hr.divider {
      border: none;
      border-top: 0.5px solid var(--border);
      width: 100%;
      margin: 2.5rem 0 1.5rem;
    }

    .analytics-bar {
      width: 100%;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-size: 12px;
      color: var(--hint);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .analytics-bar svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--hint); }

    .restart-link {
      font-size: 12px;
      color: var(--hint);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      margin-top: 1rem;
      display: inline-block;
      background: none;
      border: none;
      font-family: inherit;
    }
    .restart-link:hover { color: var(--muted); }

    /* ── API Key Notice ── */

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      color: var(--hint);
      border-top: 0.5px solid var(--border);
    }

    @media (max-width: 500px) {
      .options { grid-template-columns: 1fr; }
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.25rem; }
    }

    /* ── Vignette stage ── */
    #vignette-stage {
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      max-width: 640px;
      margin: 0 auto;
    }
    .vignette-body {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      line-height: 1.75;
      color: var(--text);
      min-height: 120px;
      max-width: 560px;
    }
    .vignette-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--hint);
      margin-top: 1.5rem;
      align-self: flex-start;
    }
  </style>

<body>

  <nav>
    <a href="#" class="nav-logo">Phil Weldon</a>
    <ul class="nav-links">
      <li><a href="speaking.html">Speaking</a></li>
      <li><a href="writing.html">Writing</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="https://www.philweldon.com/support.html">Support</a></li>
      <li><a href="https://www.philweldon.com/privacy.html">Privacy</a></li>
    </ul>
  </nav>

  <!-- Step 1: Visitor question -->
  <div id="stage">
    <p class="eyebrow">Welcome</p>
    <h1 class="question">What brings you here today?</h1>
    <p class="sub">I'll tailor my introduction to you.</p>

    <div class="options">
      <button class="opt-btn" onclick="choose('organizer')">
        <span class="opt-icon">🎤</span>
        <span class="opt-label">Planning an event</span>
        <span class="opt-hint">booking & topics</span>
      </button>
      <button class="opt-btn" onclick="choose('journalist')">
        <span class="opt-icon">📰</span>
        <span class="opt-label">Writing</span>
        <span class="opt-hint"></span>
      </button>
      <button class="opt-btn" onclick="openVignette()">
        <span class="opt-icon">⚖️</span>
        <span class="opt-label">Courtroom, 2035</span>
        <span class="opt-hint">a future-of-law vignette, written live by AI</span>
      </button>
      <button class="opt-btn" onclick="choose('curious')">
        <span class="opt-icon">✨</span>
        <span class="opt-label">Just curious</span>
        <span class="opt-hint">AI, ideas & writing</span>
      </button>
    </div>
  </div>

  <!-- Step 2: Tailored intro -->
  <div id="intro-stage">
    <div id="visitor-badge" class="visitor-badge"></div>
    <h1 class="intro-name">Hi, I'm Phil Weldon.</h1>
    <div class="intro-body" id="intro-body">
      <span class="loading-dots"><span></span><span></span><span></span></span>
    </div>

    <div class="intro-actions" id="intro-actions" style="display:none">
      <button class="action-btn" id="action1">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M9 3l5 5-5 5"/></svg>
        <span id="action1-label"></span>
      </button>
      <button class="action-btn" id="action2">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6h6M5 9h4"/></svg>
        <span id="action2-label"></span>
      </button>
      <button class="action-btn" id="action3" onclick="window.location.href='contact.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4zM5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/></svg>
        Get in touch
      </button>
    </div>

    <hr class="divider">

    <div class="analytics-bar">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="3" height="6"/><rect x="6" y="5" width="3" height="10"/><rect x="11" y="1" width="3" height="14"/></svg>
      <span id="analytics-label">Logging visit...</span>
    </div>

    <button class="restart-link" onclick="restart()">← Start over</button>
  </div>

  <!-- Step 2b: Future-of-law vignette -->
  <div id="vignette-stage">
    <div class="visitor-badge">⚖️ From the future of law</div>
    <h1 class="intro-name">A dispatch from 2035.</h1>
    <div class="vignette-body" id="vignette-body">
      <span class="loading-dots"><span></span><span></span><span></span></span>
    </div>
    <p class="vignette-meta" id="vignette-meta"></p>

    <div class="intro-actions" id="vignette-actions" style="display:none">
      <button class="action-btn" onclick="generateVignette()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.5 8a5.5 5.5 0 11-1.6-3.9M13.5 1.5v3h-3"/></svg>
        Another vignette
      </button>
      <button class="action-btn" onclick="window.location.href='speaking.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M9 3l5 5-5 5"/></svg>
        Hear me speak on this
      </button>
      <button class="action-btn" onclick="window.location.href='contact.html'">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4zM5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/></svg>
        Get in touch
      </button>
    </div>

    <button class="restart-link" onclick="restartFromVignette()">← Start over</button>
  </div>

  <footer>
    philweldon.com &nbsp;·&nbsp; Built with care (and a little AI)
  </footer>

  <script>
    // ── ONLY LINE YOU NEED TO EDIT ────────────────────────────
    // After deploying your Cloudflare Worker, replace the URL below
    // with your Worker URL (e.g. https://philweldon-proxy.YOUR-NAME.workers.dev)
    const WORKER_URL = 'https://philweldon-proxy.pbweldon-2ef.workers.dev';
    // ─────────────────────────────────────────────────────────

    const TYPES = {
      organizer: {
        badge: '🎤 Event organizer',
        action1: 'See speaking topics',
        action1href: 'speaking.html',
        action2: 'Read my writing',
        action2href: 'writing.html',
        prompt: `You are the voice of Phil Weldon's personal website. Phil is a professional speaker and writer with a deep interest in AI — particularly how it reshapes work, communication, and society. He speaks at panels and roundtables and is known for making complex AI topics feel approachable and thought-provoking.\n\nWrite a warm, conversational 3-sentence introduction for someone who has arrived at the site because they are planning an event and are considering Phil as a speaker. Mention his passion for making AI understandable, his experience at panels and roundtables, and make them feel like they've come to the right place. Do not use hype or clichés. Write in first person as Phil.`
      },
      journalist: {
        badge: '📰 Writing',
        action1: 'Read recent writing',
        action1href: 'writing.html',
        action2: 'Get in touch',
        action2href: 'contact.html',
        prompt: `You are the voice of Phil Weldon's personal website. Phil is a professional speaker and writer with a deep interest in AI — particularly how it reshapes work, communication, and society. He writes essays and appears on podcasts and panels.\n\nWrite a warm, conversational 3-sentence introduction for a journalist or media professional who has arrived to research Phil or seek a quote or interview. Mention his clear perspective on AI, his availability for press conversations, and that he enjoys engaging with curious, critical journalists. Do not use hype or clichés. Write in first person as Phil.`
      },
      curious: {
        badge: '✨ Curious visitor',
        action1: 'Explore my ideas',
        action1href: 'speaking.html',
        action2: 'Read recent essays',
        action2href: 'writing.html',
        prompt: `You are the voice of Phil Weldon's personal website. Phil is a professional speaker and writer with a deep interest in AI — particularly how it reshapes work, communication, and society. He loves exploring ideas with anyone willing to think.\n\nWrite a warm, conversational 3-sentence introduction for someone who has wandered in out of curiosity about AI, ideas, or Phil's writing. Be inviting and a little playful. Mention his belief that AI is one of the most interesting things happening right now, and that his favourite conversations happen with people who haven't made up their minds about it yet. Do not use hype or clichés. Write in first person as Phil.`
      }
    };

    const counts = { organizer: 0, journalist: 0, curious: 0 };

    function updateAnalytics() {
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      const parts = Object.entries(counts)
        .filter(([, v]) => v > 0)
        .map(([k, v]) => `${v} ${k}${v > 1 ? 's' : ''}`);
      document.getElementById('analytics-label').textContent =
        `Visit logged · ${total} visit${total !== 1 ? 's' : ''} this session: ${parts.join(', ')}`;
    }

    async function choose(type) {
      document.getElementById('stage').style.display = 'none';
      const introEl = document.getElementById('intro-stage');
      introEl.style.display = 'flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      const config = TYPES[type];
      document.getElementById('visitor-badge').textContent = config.badge;
      document.getElementById('action1-label').textContent = config.action1;
      document.getElementById('action2-label').textContent = config.action2;

      const btn1 = document.getElementById('action1');
      const btn2 = document.getElementById('action2');
      btn1.onclick = config.action1href ? () => window.location.href = config.action1href : null;
      btn2.onclick = config.action2href ? () => window.location.href = config.action2href : null;
      btn1.style.opacity = config.action1href ? '1' : '0.5';
      btn2.style.opacity = config.action2href ? '1' : '0.5';
      document.getElementById('intro-actions').style.display = 'none';

      counts[type]++;
      updateAnalytics();

      const bodyEl = document.getElementById('intro-body');

      try {
        await streamClaude(config.prompt, bodyEl, 300);
        document.getElementById('intro-actions').style.display = 'flex';
      } catch (e) {
        bodyEl.innerHTML = `<span style="color:#c0392b;font-size:14px">⚠ ${e.message || 'Something went wrong. Please try again.'}</span>`;
      }
    }

    // ── Shared streaming helper ──
    // Streams a Claude response into bodyEl with a typing cursor.
    async function streamClaude(prompt, bodyEl, maxTokens) {
      bodyEl.innerHTML = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bodyEl.appendChild(cursor);

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-haiku-4-5',
            max_tokens: maxTokens,
            stream: true,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `Error ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6).trim();
              if (data === '[DONE]') continue;
              try {
                const json = JSON.parse(data);
                if (json.type === 'content_block_delta' && json.delta?.text) {
                  bodyEl.insertBefore(document.createTextNode(json.delta.text), cursor);
                }
              } catch {}
            }
          }
        }
      } finally {
        cursor.remove();
      }
    }

    // ── Future-of-law vignette ──
    const VIGNETTE_ANGLES = [
      'an AI co-counsel whispering to a nervous first-year associate during their first hearing',
      'a small-town solo practitioner using tools that once belonged only to big firms',
      'a judge deciding whether to follow an algorithm\'s sentencing recommendation',
      'a contract quietly renegotiating itself at 3 a.m. while both parties sleep',
      'document discovery in a case with two billion files and one human reviewer',
      'jury selection in a world where everyone\'s online life is searchable',
      'a malpractice hearing where the AI was right and the lawyer overrode it',
      'cross-examining an expert about whether the video evidence is a deepfake',
      'a law student\'s first day, learning what the machines still can\'t do',
      'a courtroom translation AI catching a nuance that changes the outcome',
      'an access-to-justice kiosk in a grocery store handling an eviction notice',
      'the retirement party of the last paralegal who did it all by hand'
    ];

    function vignettePrompt() {
      const angle = VIGNETTE_ANGLES[Math.floor(Math.random() * VIGNETTE_ANGLES.length)];
      return `You are writing for Phil Weldon's personal website. Phil is a professional speaker and writer on AI, with a particular interest in legal tech and how AI is reshaping the practice of law.\n\nWrite a vivid, self-contained vignette of 90-130 words set in the near future of law (sometime between 2030 and 2040). This scene's angle: ${angle}.\n\nGround it in one specific human moment and one concrete, plausible detail of legal technology. Show, don't explain. No title, no preamble, no hype, no cliches. End on a line that lingers.`;
    }

    function stampVignetteMeta() {
      const docket = '2035-' + (Math.floor(Math.random() * 9000) + 1000);
      const t = new Date().toTimeString().slice(0, 8);
      document.getElementById('vignette-meta').textContent =
        `Docket no. ${docket} · generated ${t} · never the same twice`;
    }

    async function generateVignette() {
      const bodyEl = document.getElementById('vignette-body');
      document.getElementById('vignette-actions').style.display = 'none';
      document.getElementById('vignette-meta').textContent = '';

      try {
        await streamClaude(vignettePrompt(), bodyEl, 350);
        stampVignetteMeta();
      } catch (e) {
        bodyEl.innerHTML = `<span style="color:#c0392b;font-size:14px">⚠ ${e.message || 'Something went wrong. Please try again.'}</span>`;
      }
      document.getElementById('vignette-actions').style.display = 'flex';
    }

    function openVignette() {
      document.getElementById('stage').style.display = 'none';
      document.getElementById('vignette-stage').style.display = 'flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      generateVignette();
    }

    function restartFromVignette() {
      document.getElementById('vignette-stage').style.display = 'none';
      document.getElementById('vignette-body').innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
      document.getElementById('vignette-actions').style.display = 'none';
      document.getElementById('vignette-meta').textContent = '';
      document.getElementById('stage').style.display = 'flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restart() {
      document.getElementById('intro-stage').style.display = 'none';
      document.getElementById('intro-body').innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
      document.getElementById('intro-actions').style.display = 'none';
      document.getElementById('stage').style.display = 'flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

</body>
